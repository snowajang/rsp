openapi: 3.0.3
info:
  title: Linkage Center API
  version: 1.1.0
  description: 'เอกสาร API สำหรับระบบ Linkage Center และบริการตรวจสอบบัตร/สถานะประชาชน


    การยืนยันตัวตนของกลุ่ม Linkage รองรับ  Authorization: Bearer <token>


    เพื่อความสะดวกในการทดสอบผ่าน Swagger UI แนะนำให้ใช้ BearerAuth เป็นหลัก

    '
servers:
- url: /
  description: Current server
tags:
- name: Linkage Login
  description: ขั้นตอนรับ token และยืนยันตัวตนกับ Linkage Center
- name: Linkage User
  description: ตรวจสอบข้อมูลผู้ใช้งานหลัง login
- name: Linkage Request
  description: ส่งคำขอ ข้อมูล ไปยัง Linkage Center
- name: Linkage Session
  description: ต่ออายุและยกเลิก session ของ Linkage
- name: CheckPop
  description: ตรวจสอบสถานะบุคคล/บัตรจาก DOPA Service
- name: CheckLaser
  description: ตรวจสอบบัตรด้วยเลข Laser จาก DOPA Service
- name: CheckChip
  description: ตรวจสอบบัตรด้วย ChipNo และ bp1no จาก DOPA Service
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ใช้กับ endpoint กลุ่ม Linkage ที่ต้องมี token หลัง login
  headers:
    XRequestId:
      description: Correlation ID สำหรับ trace คำขอแต่ละรายการ
      schema:
        type: string
        example: req-20260307-0001
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          example: body not variable is required
    ErrorEnvelope:
      type: object
      required:
      - errorNumber
      - errorMessage
      - data
      properties:
        errorNumber:
          type: integer
          example: 401
        errorMessage:
          type: string
          nullable: true
          example: Unauthorized
        data:
          nullable: true
          oneOf:
          - type: object
          - type: 'null'
    StandardApiEnvelope:
      type: object
      required:
      - errorNumber
      - errorMessage
      - data
      properties:
        errorNumber:
          type: integer
          example: 0
        errorMessage:
          type: string
          nullable: true
          example: null
        data:
          description: ข้อมูลที่ส่งกลับจากบริการต้นทาง
          oneOf:
          - type: object
          - type: array
            items: {}
          - type: string
          - type: integer
          - type: boolean
          - type: 'null'
    LinkageLoginSmcRequest:
      type: object
      required:
      - pid
      - cid
      properties:
        pid:
          type: string
          pattern: ^\d{13}$
          description: เลขประจำตัวประชาชน 13 หลัก
          example: '1234567890123'
        cid:
          type: string
          description: เลข chip ของ Smart Card
          example: A1B2C3D4E5F6
    LinkageLoginSmcResponseData:
      type: object
      properties:
        errorNumber:
          type: integer
          example: 401
        errorMessage:
          type: string
          nullable: true
          example: Unauthorized
        data:
          type: object
          properties:            
            random:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9vdemo
            office:
              type: array
              items:
                id:
                  type: integer
                  example: 1001
                name:
                  type: string
                  example: หน่วยงาน
      additionalProperties: true
    LinkageLoginSmcEnvelope:
      type: object
      properties:
        errorNumber:
          type: integer
          example: 401
        errorMessage:
          type: string
          nullable: true
          example: Unauthorized
        data:
          type: object
          properties:            
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyUGVyc29uYWxJRCI6NDQ0NDQ0NDQ0NDQ0MywidXNlck9mZmljZUlEIjoxMDAwMDAsInByb3h5T2ZmaWNlSUQiOjIwMDAwMCwibG9naW5UeXBlIjoxLCJleHAiOjIyMDAwMDAwMDB9.8c3c6ocJ62p709sgBGs355l-t2Nh9kGOBDP9TPFuPs8
    LinkageLoginSmcAuthRequest:
      type: object
      required:
      - xrandom
      - xenvelop
      properties:
        xrandom:
          type: string
          description: ค่า random ที่ได้จาก Linkage
          example: 8f2db2f7c6a84cb9
        xenvelop:
          type: string
          description: envelope ที่ได้จากบัตร
          example: U0lHTkFUVVJFX0ZST01fQ0FSRA==
    LinkageLoginThaiDRequest:
      type: object
      required:
      - accessToken
      properties:
        pid:
          type: string
          pattern: ^\d{13}$
          description: เลขประจำตัวประชาชน (ถ้ามี)
          example: '1234567890123'
        name:
          type: string
          description: ชื่อ-สกุล ผู้ใช้งาน
          example: สมชาย ใจดี
        accessToken:
          type: string
          description: Access token ที่ได้จาก ThaiD
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6InRoYWlkIn0.demo
    LinkageUserResponseData:
      type: object
      properties:
        personalID:
          type: string
          example: '1234567890123'
        fullName:
          type: string
          example: สมชาย ใจดี
        officeID:
          type: integer
          example: 1001
        officeName:
          type: string
          example: สำนักทะเบียนอำเภอตัวอย่าง
        positionName:
          type: string
          example: เจ้าพนักงานปกครอง
        roles:
          type: array
          items:
            type: string
          example:
          - viewer
          - operator
      additionalProperties: true
    LinkageUserEnvelope:
      allOf:
      - $ref: '#/components/schemas/StandardApiEnvelope'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/LinkageUserResponseData'
    LinkageSearchRequest:
      type: object
      description: Payload สำหรับส่งต่อไปยัง /api/center/request/ โดยตรง
      required:
      - serviceName
      - requestBody
      properties:
        jobID:
          type: string
          description: รหัสหรือชื่อบริการที่ต้องการเรียกจาก Linkage Center
          example: eeeeeeee-eeee-4eee-aeee-eeeeeeeeeeee
        data:
          type: array
          items:
            serviceID:
              type: integer
              example: 2
              description: รหัส Service ที่ต้องการเรียกจาก Linkage Center
            query:
              type: object
              peroperties:
                personalId:
                  type: string
                  pattern: ^\d{13}$
                  description: เลขประจำตัวประชาชน 13 หลัก
                  example: '1234567890123'
          description: ข้อมูลคำขอตาม service ที่เลือก
          example:
            personalId: '1234567890123'
            requestChannel: web
        requestRef:
          type: string
          description: เลขอ้างอิงคำขอจากต้นทาง
          example: LC-REQ-20260307-001
      additionalProperties: true
    LinkageSearchEnvelope:
      allOf:
      - $ref: '#/components/schemas/StandardApiEnvelope'
      - type: object
        properties:
          data:
            type: object
            additionalProperties: true
            example:
              transactionId: TXN-20260307-0001
              resultCount: 1
              items:
              - personalId: '1234567890123'
                fullName: สมชาย ใจดี
    LinkageRenewRequest:
      type: object
      description: ข้อมูลเพิ่มเติมกรณี backend ต้องการระบุ context ของการ renew
      properties:
        reason:
          type: string
          example: keep-session-alive
      additionalProperties: true
    LinkageRenewEnvelope:
      type: object
      properties:
        errorNumber:
          type: integer
          example: 401
        errorMessage:
          type: string
          nullable: true
          example: Unauthorized
        data:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.renewed
    LinkageLogoutRequest:
      type: object
      description: Payload เพิ่มเติม (ถ้ามี)
      properties:
        reason:
          type: string
          example: user-request
      additionalProperties: true
    LinkageLogoutEnvelope:
      allOf:
      - $ref: '#/components/schemas/StandardApiEnvelope'
      - type: object
        properties:
          data:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: logout completed
    CheckDeathRequest:
      type: object
      required:
      - targetId
      - dob
      properties:
        targetId:
          type: string
          pattern: ^\d{13}$
          description: เลขประจำตัวประชาชน 13 หลัก
          example: '1234567890123'
        dob:
          type: string
          description: วันที่เกิดในรูปแบบที่ web service ต้องการ เช่น YYYYMMDD
          example: '19800101'
    CheckDeathResponseData:
      type: object
      properties:
        stCode:
          type: string
          nullable: true
          example: '0'
        stDesc:
          type: string
          example: พบข้อมูลบุคคล
        isError:
          type: boolean
          example: false
        isErrorMessage:
          type: string
          example: ''
    CheckDeathEnvelope:
      allOf:
      - $ref: '#/components/schemas/StandardApiEnvelope'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/CheckDeathResponseData'
    CheckLaserRequest:
      type: object
      required:
      - pid
      - fname
      - lname
      - dob
      - laser
      properties:
        pid:
          type: string
          pattern: ^\d{13}$
          description: เลขประจำตัวประชาชน 13 หลัก
          example: '1234567890123'
        fname:
          type: string
          description: ชื่อจริง
          example: สมชาย
        lname:
          type: string
          description: นามสกุล
          example: ใจดี
        dob:
          type: string
          description: วันเดือนปีเกิดในรูปแบบที่ service ต้องการ
          example: '19800101'
        laser:
          type: string
          description: เลข Laser ด้านหลังบัตรประชาชน
          example: JT0-1234567-89
    CheckLaserResponse:
      type: object
      properties:
        isError:
          type: boolean
          example: false
        isErrorDesc:
          type: string
          example: ''
        code:
          type: integer
          example: 0
        desc:
          type: string
          example: ตรวจสอบข้อมูลสำเร็จ
    CheckChipRequest:
      type: object
      required:
      - pid
      - chipno
      - bp1no
      properties:
        pid:
          type: string
          pattern: ^\d{13}$
          description: เลขประจำตัวประชาชน 13 หลัก
          example: '1234567890123'
        chipno:
          type: string
          description: หมายเลขชิปการ์ด (ChipNo)
          example: A1B2C3D4E5F6
        bp1no:
          type: string
          description: รหัส BP1 ตามที่ต้นทางกำหนดใช้
          example: '0101'
    CheckChipResponse:
      type: object
      properties:
        isError:
          type: boolean
          example: false
        isErrorDesc:
          type: string
          example: ''
        code:
          type: integer
          example: 0
        desc:
          type: string
          example: ตรวจสอบข้อมูลสำเร็จ
    LinkageErrorResponse:
      type: object
      required:
      - errorNumber
      - errorMessage
      properties:
        errorNumber:
          type: integer
          example: 9999
        errorMessage:
          type: string
          example: '[9999] ข้อความอธิบายปัญหา'
    ResponseFromService2:
      type: object
      properties:
        errorNumber:
          type: integer
          example: 401
        errorMessage:
          type: string
          nullable: true
          example: Unauthorized
        data:
          nullable: true
          oneOf:
          - type: object
          - type: 'null'
          type: array
          items:
            type: object
            properties:            
              serviceID:
                type: integer
                example: 1
                description: รหัส Service
              responseStatus:
                type: integer
                example: 200
                description: สถานะตอบกลับ HTTP Status ของ Service
              responseContentType:
                type: string
                example: application/json; charset=utf-8
                description: Response Content-Type ของ Service
              responseData:
                type: object
                description: ข้อมูลที่ตอบกลับจาก Service
                additionalProperties: true
                example:
                  example: example response data from service2
              responseError:
                oneOf:
                - type: string
                - type: 'null'
                example: null
              responseTimeMs:
                type: integer
                example: 800
                description: เวลาที่ใช้ในการตอบกลับ (หน่วย Milliseconds)
  responses:
    BadRequestError:
      description: คำขอไม่ถูกต้องหรือข้อมูลไม่ครบ
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - $ref: '#/components/schemas/ErrorEnvelope'
    InternalServerError:
      description: เกิดข้อผิดพลาดภายในระบบ
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/ErrorResponse'
            - $ref: '#/components/schemas/ErrorEnvelope'
    LinkageBadRequest:
      description: คำขอไม่ถูกต้อง
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
    LinkageUnauthorized:
      description: ไม่ได้รับอนุญาตให้เข้าถึง
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
    LinkageForbidden:
      description: ไม่มีสิทธิ์เข้าถึงทรัพยากรนี้
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
    LinkageNotFound:
      description: ไม่พบทรัพยากรที่ร้องขอ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
    LinkageTimeout:
      description: การเชื่อมต่อใช้เวลานานเกินกำหนด
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
    LinkageInternalServerError:
      description: เกิดข้อผิดพลาดภายในระบบ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LinkageErrorResponse'
          examples:
            default:
              value:
                errorNumber: 9999
                errorMessage: '[9999] ข้อความอธิบายปัญหา'
paths:
  /api/linkage/login/smc:
    post:
      tags:
      - Linkage Login
      summary: Login ด้วยบัตร Smart Card (SMC)
      description: ใช้เลขประจำตัวประชาชนและ Chip ID เพื่อขอ token เริ่มต้นจาก Linkage Center
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkageLoginSmcRequest'
            examples:
              sample:
                value:
                  pid: '1234567890123'
                  cid: A1B2C3D4E5F6
      responses:
        '200':
          description: Login สำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkageLoginSmcEnvelope'
              examples:
                success:
                  value:
                    errorNumber: 0
                    errorMessage: null
                    data:
                      random: demo-random-token
                      office: [
                        {
                          id: 1001,
                          name: หน่วยงาน
                        },
                        {
                          id: 1002,
                          name: หน่วยงาน2
                        }
                      ]
        '400':
          $ref: '#/components/responses/LinkageBadRequest'
        '500':
          $ref: '#/components/responses/LinkageInternalServerError'
        '401':
          $ref: '#/components/responses/LinkageUnauthorized'
        '403':
          $ref: '#/components/responses/LinkageForbidden'
        '404':
          $ref: '#/components/responses/LinkageNotFound'
        '408':
          $ref: '#/components/responses/LinkageTimeout'
  /api/linkage/login/smc/auth:
    post:
      tags:
      - Linkage Login
      summary: ยืนยันตัวตน SMC ด้วย random/envelope
      description: ใช้ข้อมูลจากการลงนามของบัตร Smart Card เพื่อยืนยันการ login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkageLoginSmcAuthRequest'
            examples:
              sample:
                value:
                  xrandom: 8f2db2f7c6a84cb9
                  xenvelop: U0lHTkFUVVJFX0ZST01fQ0FSRA==
      responses:
        '200':
          description: ยืนยันตัวตนสำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkageLoginSmcEnvelope'
              examples:
                success:
                  value:
                    errorNumber: 0
                    errorMessage: null
                    data:
                      token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyUGVyc29uYWxJRCI6NDQ0NDQ0NDQ0NDQ0MywidXNlck9mZmljZUlEIjoxMDAwMDAsInByb3h5T2ZmaWNlSUQiOjIwMDAwMCwibG9naW5UeXBlIjoxLCJleHAiOjIyMDAwMDAwMDB9.8c3c6ocJ62p709sgBGs355l-t2Nh9kGOBDP9TPFuPs8
        '400':
          $ref: '#/components/responses/LinkageBadRequest'
        '500':
          $ref: '#/components/responses/LinkageInternalServerError'
        '401':
          $ref: '#/components/responses/LinkageUnauthorized'
        '403':
          $ref: '#/components/responses/LinkageForbidden'
        '404':
          $ref: '#/components/responses/LinkageNotFound'
        '408':
          $ref: '#/components/responses/LinkageTimeout'
  /api/linkage/login/thaid/auth:
    post:
      tags:
      - Linkage Login
      summary: Login ด้วย ThaiD
      description: ใช้ access token จาก ThaiD เพื่อยืนยันตัวตนกับ Linkage Center
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkageLoginThaiDRequest'
            examples:
              sample:
                value:
                  pid: '1234567890123'
                  name: สมชาย ใจดี
                  accessToken: eyJhbGciOiJSUzI1NiIsImtpZCI6InRoYWlkIn0.demo
      responses:
        '200':
          description: Login ThaiD สำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkageLoginSmcEnvelope'
        '400':
          $ref: '#/components/responses/LinkageBadRequest'
        '500':
          $ref: '#/components/responses/LinkageInternalServerError'
        '401':
          $ref: '#/components/responses/LinkageUnauthorized'
        '403':
          $ref: '#/components/responses/LinkageForbidden'
        '404':
          $ref: '#/components/responses/LinkageNotFound'
        '408':
          $ref: '#/components/responses/LinkageTimeout'
  /api/linkage/user:
    post:
      tags:
      - Linkage User
      summary: ดึงข้อมูลสิทธิ์/หน้าที่การงานของผู้ใช้
      description: ตรวจสอบข้อมูลผู้ใช้งานจาก token หลัง login
      security:
      - BearerAuth: []
      - TokenHeader: []
      responses:
        '200':
          description: ดึงข้อมูลผู้ใช้สำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkageUserEnvelope'
              examples:
                success:
                  value:
                    errorNumber: 0
                    errorMessage: null
                    data:
                      job: ["ffffffff-ffff-4fff-bfff-ffffffffffff","eeeeeeee-eeee-4eee-aeee-eeeeeeeeeeee"]
        '400':
          $ref: '#/components/responses/LinkageBadRequest'
        '500':
          $ref: '#/components/responses/LinkageInternalServerError'
        '401':
          $ref: '#/components/responses/LinkageUnauthorized'
        '403':
          $ref: '#/components/responses/LinkageForbidden'
        '404':
          $ref: '#/components/responses/LinkageNotFound'
        '408':
          $ref: '#/components/responses/LinkageTimeout'
  /api/linkage/search:
    post:
      tags:
      - Linkage Request
      summary: ค้นหาข้อมูลโดยส่งคำขอไปยัง Linkage Center
      description: ส่ง body ไปยังบริการต้นทางโดยตรงพร้อม token ที่ออกจากระบบ login
      security:
      - BearerAuth: []
      - TokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkageSearchRequest'
            examples:
              search-person:
                value:
                  jobID: eeeeeeee-eeee-4eee-aeee-eeeeeeeeeeee
                  data: [
                    {
                      serviceID: 1,
